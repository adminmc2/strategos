<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategos - Agentes IA para ELE</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FAFAF8">
    <link rel="apple-touch-icon" href="/public/app-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Strategos">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F5F5F2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }

        .badge {
            font-family: 'Inter', sans-serif;
            font-size: 0.78em;
            font-weight: 600;
            color: #2175A5;
            background: rgba(33, 117, 165, 0.06);
            border: 1.5px solid rgba(33, 117, 165, 0.15);
            padding: 8px 24px;
            border-radius: 100px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease-out 0.2s forwards;
        }

        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #1E3A5F 0%, #1E3A5F 35%, #2175A5 55%, #78B042 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.7s ease-out 0.35s forwards;
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: #8A9AAC;
            max-width: 520px;
            line-height: 1.7;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.7s ease-out 0.5s forwards;
        }

        .subtitle .hl-blue {
            color: #2175A5;
            font-weight: 600;
        }

        .subtitle .hl-green {
            color: #78B042;
            font-weight: 600;
            font-style: italic;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.05em;
            font-weight: 600;
            color: #fff;
            background: #1E3A5F;
            border: none;
            padding: 18px 48px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.3px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.7s ease-out 0.65s forwards;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(30, 58, 95, 0.25);
            background: #264d78;
        }

        .btn:active {
            transform: translateY(0);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <main class="hero">
        <div class="badge">Agentes IA para ELE</div>
        <h1 class="title">STRATEGOS</h1>
        <p class="subtitle">
            Tus <span class="hl-blue">agentes inteligentes</span> para aprender español con
            <span class="hl-green">estrategias reales</span>.
        </p>
        <button class="btn" onclick="window.location.href='agentes.html'">
            Comenzar
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12H19M19 12L12 5M19 12L12 19"/>
            </svg>
        </button>
        <span style="margin-top: 24px; font-size: 0.75em; color: #bbb; letter-spacing: 1px;">v1.0.0</span>
    </main>
</body>
</html>
